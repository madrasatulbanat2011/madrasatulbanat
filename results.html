<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Student Results</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:green;
color:white;
}

button{
padding:8px 15px;
background:green;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2 align="center">
All Student Results
</h2>

<table>

<thead>

<tr>

<th>Student ID</th>
<th>Exam</th>
<th>Total</th>
<th>Percentage</th>
<th>Grade</th>
<th>Action</th>

</tr>

</thead>

<tbody id="resultTable">

</tbody>

</table>

</div>

<script type="module" src="results.js"></script>

</body>
</html>
