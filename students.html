<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students List</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#006b3c;
}

input{
width:100%;
padding:10px;
margin:15px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#006b3c;
color:white;
}

button{
padding:6px 12px;
background:#006b3c;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#004f2d;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Database</h1>

<input
type="text"
id="searchBox"
placeholder="Search Student">

<table>

<thead>

<tr>

<th>Name</th>
<th>Class</th>
<th>Mobile</th>
<th>Village</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

<script type="module" src="students.js"></script>

</body>
</html>
