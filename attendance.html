<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Attendance</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#006b3c;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#006b3c;
    color:#fff;
}

button{
    background:#006b3c;
    color:#fff;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-top:20px;
}

button:hover{
    background:#004f2d;
}

</style>

</head>

<body>

<div class="container">

<h1>Student Attendance</h1>

<table>

<thead>

<tr>

<th>Name</th>
<th>Class</th>
<th>Present</th>
<th>Absent</th>

</tr>

</thead>

<tbody id="attendanceTable">

</tbody>

</table>

<button id="saveAttendance">
Save Attendance
</button>

</div>

<script type="module" src="attendance.js"></script>

</body>
</html>
