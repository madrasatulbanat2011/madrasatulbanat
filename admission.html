<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Admission Form</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f4f8f5;
font-family:Arial,sans-serif;
}

.form-container{
max-width:900px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#006b3c;
margin-bottom:30px;
}

.row{
display:flex;
gap:20px;
margin-bottom:15px;
}

.col{
flex:1;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input,
select,
textarea{

width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

textarea{

height:90px;

}

button{

background:#006b3c;
color:#fff;
padding:14px 30px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#004f2d;

}

@media(max-width:768px){

.row{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="form-container">

<h1>📝 Online Admission Form</h1>

<form>

<h2>Student Information</h2>

<div class="row">

<div class="col">

<label>Student Name</label>

<input type="text" name="studentName" required>

</div>

<div class="col">

<label>Date of Birth</label>

<input type="date" name="dob" required>

</div>

</div>

<div class="row">

<div class="col">

<label>Class</label>
  
<select name="class" required>

<option>Nursery</option>

<option>I</option>

<option>II</option>

<option>III</option>

<option>IV</option>

<option>V</option>

<option>VI</option>

<option>VII</option>

<option>VIII</option>

<option>IX</option>

<option>X</option>

</select>

</div>

<div class="col">

<label>Religion</label>

  <input type="text" name="religion">

</div>

</div>

<div class="row">

<div class="col">

<label>Father Name</label>

<input type="text" name="fatherName">

</div>

<div class="col">

<label>Mother Name</label>

<input type="text" name="motherName">

</div>

</div>

<div class="row">

<div class="col">

<label>Mobile Number</label>

<input type="tel" name="mobile">

</div>

<div class="col">

<label>WhatsApp Number</label>

<input type="tel" name="whatsapp">

</div>

</div>

<label>Village</label>

<input type="text" name="village">

<label>Post Office</label>

<input type="text" name="postOffice">

<label>Police Station</label>

<input type="text" name="policeStation">

<label>District</label>

<input type="text" name="district">

<label>PIN Code</label>

<input type="number" name="pinCode">

<label>Previous School</label>
<input type="text" name="previousSchool">

<label>Remarks</label>
<textarea name="remarks"></textarea>

<label>Student Photo</label>

<input type="file" name="photo">

<br><br>

<center>

<button type="submit">

Submit Admission Form

</button>

</center>

</form>

</div>

</body>

</html>
